<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal Finance</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --text: #1f2a24;
      --muted: #5a665f;
      --line: #d8ded6;
      --accent: #215f4b;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Personal Finance</h1>
    <p>Personal Finance is a private personal finance tool for viewing the app owner's own linked bank account information.</p>
    <nav aria-label="Policy links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Use</a>
    </nav>
  </main>
</body>
</html>
