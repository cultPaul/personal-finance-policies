<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Callback | Personal Finance</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --text: #1f2a24;
      --muted: #5a665f;
      --line: #d8ded6;
      --accent: #215f4b;
      --danger: #8a2f24;
      --panel: #ffffff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
      margin: 0 0 16px;
    }
    code {
      display: block;
      overflow-wrap: anywhere;
      margin: 18px 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.95rem;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 10px 14px;
    }
    .error {
      color: var(--danger);
      font-weight: 700;
    }
    .meta {
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 0.95rem;
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Personal Finance Callback</h1>
    <p id="summary">Reading callback parameters...</p>
    <code id="code" hidden></code>
    <button id="copy" type="button" hidden>Copy code</button>
    <p class="meta">Only use this page for the Personal Finance private banking authorisation flow. Do not share real-bank callback codes in chat.</p>
    <p><a href="index.html">Back to Personal Finance</a></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");
    const description = params.get("error_description");
    const summary = document.getElementById("summary");
    const codeEl = document.getElementById("code");
    const copy = document.getElementById("copy");

    if (error) {
      summary.className = "error";
      summary.textContent = description ? `${error}: ${description}` : error;
    } else if (code) {
      summary.textContent = "Authorisation code received. Copy this code and exchange it locally with the Personal Finance script.";
      codeEl.hidden = false;
      codeEl.textContent = code;
      copy.hidden = false;
      copy.addEventListener("click", async () => {
        await navigator.clipboard.writeText(code);
        copy.textContent = "Copied";
      });
    } else {
      summary.className = "error";
      summary.textContent = "No authorisation code was found in the callback URL.";
    }
  </script>
</body>
</html>
